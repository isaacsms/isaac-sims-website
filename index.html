<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>isaac-sims.com</title>
  <meta name="description" content="Isaac Sims — Designer. Fashion, industrial and graphic design.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home-body page-home">

  <!-- NAVIGATION -->
  <nav>
    <span class="site-name"><a href="index.html">isaac-sims.com</a></span>
    <div class="nav-links">
      <a href="store.html">store</a>
      <a href="about.html">about</a>
      <a href="explore.html">explore</a>
    </div>
  </nav>

  <!-- HOME LAYOUT: Left = project list, Right = preview image -->
  <main class="home-layout">

    <!-- LEFT PANEL -->
    <div class="home-left">

      <!--
        HOME ICON — floats over the top of the project list.
        File: images/home-icon.png (transparent background PNG)
        Replace the src below if you rename or move the file.
      -->
      <img class="home-icon-img" src="images/home-icon.png" alt="">

      <!-- Project list — populated from data.js by main.js -->
      <ul class="project-list" id="project-list"></ul>

    </div>

    <!-- RIGHT PANEL — full-bleed preview image + hover popup overlay -->
    <div class="home-right" id="home-right">

      <!--
        HOVER POPUP — overlays the top-left of the image on project hover.
        Title: Times (serif). Description: Monument Grotesk (sans-serif).
      -->
      <div class="project-hover-popup" id="project-popup">
        <div class="popup-title"></div>
        <div class="popup-desc"></div>
      </div>

      <!-- Preview images injected here by main.js -->
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
