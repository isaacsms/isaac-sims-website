<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>isaac-sims.com</title>
  <meta name="description" content="Isaac Sims — Designer. Fashion, industrial and graphic design.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home-body page-home">

  <!-- NAVIGATION -->
  <nav>
    <span class="site-name"><a href="index.html">isaac-sims.com</a></span>
    <div class="nav-links">
      <a href="store.html">store</a>
      <a href="about.html">about</a>
      <a href="explore.html">explore</a>
    </div>
  </nav>

  <!--
    HOVER POPUP — appears top-left when a project is hovered.
    Title uses the serif font; description uses the body font.
    Hidden by default, shown by JS.
  -->
  <div class="project-hover-popup" id="project-popup">
    <div class="popup-title"></div>
    <div class="popup-desc"></div>
  </div>

  <!-- HOME LAYOUT: Left = project list, Right = preview image -->
  <main class="home-layout">

    <!-- LEFT PANEL -->
    <div class="home-left">

      <!--
        SKETCH ILLUSTRATION
        To use your own sketch: save it as images/sketch.png
        then replace the <svg> below with:
        <img src="images/sketch.png" alt="Studio sketch">
      -->
      <div class="sketch-container">
        <svg class="sketch-placeholder" viewBox="0 0 140 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 80 L20 50 L70 20 L120 50 L120 80" stroke="#1a1a1a" stroke-width="0.8" fill="none"/>
          <path d="M20 80 L120 80" stroke="#1a1a1a" stroke-width="0.8"/>
          <rect x="45" y="55" width="25" height="25" stroke="#1a1a1a" stroke-width="0.6" fill="none"/>
          <rect x="80" y="58" width="16" height="14" stroke="#1a1a1a" stroke-width="0.6" fill="none"/>
          <line x1="47" y1="57" x2="55" y2="65" stroke="#1a1a1a" stroke-width="0.4"/>
          <line x1="51" y1="57" x2="60" y2="66" stroke="#1a1a1a" stroke-width="0.4"/>
          <line x1="55" y1="57" x2="64" y2="66" stroke="#1a1a1a" stroke-width="0.4"/>
        </svg>
      </div>

      <!-- Project list — populated from data.js by main.js -->
      <ul class="project-list" id="project-list"></ul>

    </div>

    <!-- RIGHT PANEL — full-bleed preview image, swapped on hover by JS -->
    <div class="home-right" id="home-right">
      <!-- Images injected here by main.js -->
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
